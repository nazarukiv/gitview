<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitView — Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
        header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 32px; display: flex; align-items: center; gap: 16px; }
        .logo { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #58a6ff, #bf91f3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        .search-mini { display: flex; gap: 8px; margin-left: auto; }
        .search-mini input { padding: 8px 16px; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #e6edf3; font-size: 14px; outline: none; width: 200px; }
        .search-mini input:focus { border-color: #58a6ff; }
        .search-mini button { padding: 8px 16px; background: #238636; border: none; border-radius: 8px; color: white; font-size: 14px; cursor: pointer; }
        .progress-overlay { position: fixed; inset: 0; background: rgba(13,17,23,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; gap: 24px; }
        .progress-overlay.hidden { display: none; }
        .progress-text { font-size: 18px; color: #8b949e; }
        .progress-bar-wrap { width: 320px; height: 6px; background: #21262d; border-radius: 99px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #58a6ff, #bf91f3); border-radius: 99px; transition: width 0.4s ease; width: 0%; }
        main { max-width: 1100px; margin: 0 auto; padding: 32px 20px; }
        .profile { display: flex; gap: 24px; align-items: center; margin-bottom: 32px; background: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 28px; }
        .avatar { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #30363d; }
        .profile-info h1 { font-size: 26px; font-weight: 700; }
        .profile-info .handle { color: #58a6ff; font-size: 15px; margin: 4px 0 8px; }
        .profile-info .bio { color: #8b949e; font-size: 14px; }
        .profile-stats { margin-left: auto; display: flex; gap: 32px; }
        .stat { text-align: center; }
        .stat-value { font-size: 28px; font-weight: 700; color: #58a6ff; }
        .stat-label { font-size: 12px; color: #8b949e; margin-top: 2px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 24px; }
        .card h3 { font-size: 14px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 20px; }
        .streak-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .streak-card { flex: 1; background: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 24px; text-align: center; }
        .streak-value { font-size: 52px; font-weight: 800; background: linear-gradient(135deg, #58a6ff, #bf91f3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .streak-label { color: #8b949e; font-size: 13px; margin-top: 4px; }
        .lang-item { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        .lang-name { width: 90px; font-size: 14px; }
        .lang-bar-wrap { flex: 1; height: 8px; background: #21262d; border-radius: 99px; overflow: hidden; }
        .lang-bar { height: 100%; border-radius: 99px; transition: width 0.8s ease; }
        .lang-pct { font-size: 13px; color: #8b949e; width: 42px; text-align: right; }
        canvas { max-height: 200px; }
    </style>
</head>
<body>

<div class="progress-overlay" id="progressOverlay">
    <div style="font-size:32px;font-weight:800;background:linear-gradient(135deg,#58a6ff,#bf91f3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">GitView</div>
    <div class="progress-text" id="progressText">Connecting...</div>
    <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar"></div>
    </div>
</div>

<header>
    <a class="logo" href="/">GitView</a>
    <div class="search-mini">
        <input type="text" id="searchInput" placeholder="Search username..." />
        <button onclick="goSearch()">Search</button>
    </div>
</header>

<main id="mainContent" style="display:none">
    <div class="profile">
        <img class="avatar" id="avatar" src="" alt="avatar" />
        <div class="profile-info">
            <h1 id="displayName">—</h1>
            <div class="handle" id="handle">—</div>
            <div class="bio" id="bio">—</div>
        </div>
        <div class="profile-stats">
            <div class="stat"><div class="stat-value" id="statRepos">—</div><div class="stat-label">Repos</div></div>
            <div class="stat"><div class="stat-value" id="statFollowers">—</div><div class="stat-label">Followers</div></div>
            <div class="stat"><div class="stat-value" id="statStars">—</div><div class="stat-label">Stars</div></div>
            <div class="stat"><div class="stat-value" id="statForks">—</div><div class="stat-label">Forks</div></div>
        </div>
    </div>

    <div class="streak-row">
        <div class="streak-card"><div class="streak-value" id="currentStreak">0</div><div class="streak-label">Current Streak (days)</div></div>
        <div class="streak-card"><div class="streak-value" id="longestStreak">0</div><div class="streak-label">Longest Streak (days)</div></div>
        <div class="streak-card"><div class="streak-value" id="totalCommits">0</div><div class="streak-label">Total Commits</div></div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Top Languages</h3>
            <div id="langList"></div>
        </div>
        <div class="card">
            <h3>Language Distribution</h3>
            <canvas id="langChart"></canvas>
        </div>
    </div>
</main>

<script>
    const username = window.location.pathname.split('/').pop();

    function goSearch() {
        const val = document.getElementById('searchInput').value.trim();
        if (val) window.location.href = '/dashboard/' + val;
    }

    document.getElementById('searchInput').addEventListener('keypress', e => {
        if (e.key === 'Enter') goSearch();
    });

    function setProgress(text, pct) {
        document.getElementById('progressText').textContent = text;
        document.getElementById('progressBar').style.width = pct + '%';
    }

    function renderDashboard(data) {
        document.getElementById('avatar').src = data.avatarUrl || '';
        document.getElementById('displayName').textContent = data.displayName || data.username;
        document.getElementById('handle').textContent = '@' + data.username;
        document.getElementById('bio').textContent = data.bio || '';
        document.getElementById('statRepos').textContent = data.publicRepos ?? '—';
        document.getElementById('statFollowers').textContent = data.followers ?? '—';
        document.getElementById('statStars').textContent = data.totalStars ?? '—';
        document.getElementById('statForks').textContent = data.totalForks ?? '—';
        document.getElementById('currentStreak').textContent = data.currentStreak ?? 0;
        document.getElementById('longestStreak').textContent = data.longestStreak ?? 0;
        document.getElementById('totalCommits').textContent = data.totalCommits ?? 0;

        const langs = data.topLanguages || [];
        const langList = document.getElementById('langList');
        langList.innerHTML = '';
        langs.forEach(l => {
            langList.innerHTML += `
                <div class="lang-item">
                    <div class="lang-name">${l.name}</div>
                    <div class="lang-bar-wrap"><div class="lang-bar" style="width:${l.percentage}%;background:${l.color}"></div></div>
                    <div class="lang-pct">${l.percentage}%</div>
                </div>`;
        });

        if (langs.length > 0) {
            new Chart(document.getElementById('langChart'), {
                type: 'doughnut',
                data: {
                    labels: langs.map(l => l.name),
                    datasets: [{ data: langs.map(l => l.percentage), backgroundColor: langs.map(l => l.color), borderWidth: 0 }]
                },
                options: {
                    plugins: { legend: { labels: { color: '#8b949e' } } },
                    cutout: '65%'
                }
            });
        }

        document.getElementById('progressOverlay').classList.add('hidden');
        document.getElementById('mainContent').style.display = 'block';
    }

    const socket = new SockJS('/ws');
    const stompClient = Stomp.over(socket);

    stompClient.connect({}, function() {
        stompClient.subscribe('/topic/progress/' + username, function(msg) {
            const data = JSON.parse(msg.body);
            setProgress(data.message, data.progress);
        });

        fetch('/api/stats/' + username)
            .then(r => r.json())
            .then(data => renderDashboard(data))
            .catch(() => setProgress('User not found', 0));
    });
</script>
</body>
</html>
